<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Sticker Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background: #f8f8f8;
    }
    header {
      background: #ff5c8d;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    h1 {
      margin: 0;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 2rem;
    }
    .sticker {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      margin: 1rem;
      width: 200px;
      text-align: center;
      padding: 1rem;
    }
    .sticker img {
      width: 100%;
      border-radius: 10px;
    }
    .sticker button {
      background: #ff5c8d;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #333;
      color: white;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Anime Sticker Shop</h1>
</header>

<div class="container" id="stickerContainer">
  <!-- Stickers will be inserted here via JS -->
</div>

<footer>
  &copy; 2026 Anime Sticker Shop
</footer>

<script>
  const stickers = [
    { name: "Naruto Sticker", price: 5, image: "https://i.imgur.com/Tl7i5hM.png" },
    { name: "Demon Slayer Sticker", price: 6, image: "https://i.imgur.com/GnKJYgU.png" },
    { name: "My Hero Academia Sticker", price: 5, image: "https://i.imgur.com/AB7dMZc.png" }
  ];

  const container = document.getElementById('stickerContainer');

  stickers.forEach(sticker => {
    const div = document.createElement('div');
    div.className = 'sticker';
    div.innerHTML = `
      <img src="${sticker.image}" alt="${sticker.name}">
      <h3>${sticker.name}</h3>
      <p>$${sticker.price}</p>
      <button onclick="buySticker('${sticker.name}', ${sticker.price})">Buy Now</button>
    `;
    container.appendChild(div);
  });

  function buySticker(name, price) {
    alert(\`You bought "\${name}" for $\${price}!\`);
  }
</script>

</body>
</html>
